[install]
saveTextLockfile = true

# Build-time constants — SSOT for contract inference, hook verification, self-healing tuning.
# Naming: CODE_REFERENCES.md § Build-time constants (defineDomain ≠ taxonomyId)
# Types: types/build-constants.d.ts · Lint: scripts/lint-build-constants.ts
# https://bun.com/docs/guides/runtime/build-time-constants
[define]
# define-domain:contract-inference
KIMI_CONTRACT_OBSERVATIONS_PATH = '".kimi/var/contract-observations.ndjson"'
KIMI_CONTRACT_SCHEMA_VERSION = '"1.0.0"'
KIMI_CONTRACT_INFERENCE_ENABLED = "true"
# define-domain:hook-verifier
KIMI_HOOK_VERIFIER_MAX_CYCLES = "32"
# define-domain:error-embedding (Phase 2)
KIMI_ERROR_EMBEDDING_DIM = "384"
# define-domain:decision-scoring (Phase 2)
KIMI_DECISION_SCORE_WINDOW_DAYS = "7"
# define-domain:error-clustering (Phase 2)
KIMI_ERROR_CLUSTER_SIMILARITY_THRESHOLD = "0.55"
# define-domain:governance
KIMI_TUNING_SET_VERSION = '"1.0.0"'

# Shared test defaults — see src/lib/test-gates.ts and scripts/run-tests.ts
[test]
preload = ["./test/setup.ts"]
# *.db.test.ts excluded — DB tests mutate shared state and must run sequentially
concurrentTestGlob = ["test/*.unit.test.ts"]
coverageSkipTestFiles = true
coveragePathIgnorePatterns = [
  "scripts/**",
  "src/bin/**",
  "src/lib/version.ts",
  "src/lib/memory-budget.ts",
  # Subprocess / platform / telemetry — covered indirectly via smoke tests
  "src/lib/kimi-doctor-wrapper.ts",
  "src/lib/institutional-memory.ts",
  "src/lib/proc-cache.ts",
  "src/lib/step-budget.ts",
  "src/lib/effect/errors.ts",
]
coverageReporter = ["text", "lcov"]
coverageDir = "./coverage"
# Coverage thresholds disabled — Bun 1.3.14 enforces per-file minimums, which
# conflicts with aggregate targets. Policy gate: kimi-governance coverage (70%).
# https://bun.com/docs/test/configuration#coverage-thresholds
smol = false
