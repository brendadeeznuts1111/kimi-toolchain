# Project DX + kimi runtime policy (discovered by dx config / kimi-doctor)
schemaVersion = 1

[runtime]
containers = "none"
packageManager = "bun"

[quality]
formatter = "oxfmt"
linter = "oxlint"
formatCheck = "bun run format:check"
lintCheck = "bun run lint"
lintTerms = "bun run lint:terms"
typecheck = "bun run typecheck"
check = "bun run check"
testCoverage = "bun run test:coverage"

[kimi]
memoryGate = true
preflight = true
