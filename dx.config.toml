# Project DX + kimi runtime policy (discovered by dx config / kimi-doctor)
schemaVersion = 1

[runtime]
containers = "none"
packageManager = "bun"

[quality]
formatter = "oxfmt"
linter = "oxlint"
formatCheck = "bun run format:check"
lintCheck = "bun run lint"

[kimi]
memoryGate = true
preflight = true
