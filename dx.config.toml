# Project DX + kimi runtime policy (discovered by dx config / kimi-doctor)
schemaVersion = 1
name = "kimi-toolchain"
scope = "project"
mode = "development"

# ── Version pins ─────────────────────────────────────────────────────────
# Consolidates all version references so `dx table extract dx.config.toml version`
# surfaces every toolchain version in one place.
[version]
configSchema = 1          # dx.config.toml schema version (top-level schemaVersion)
package = "0.1.0"         # package.json version
bunMinimum = "1.4.0"      # engines.bun / KIMI_RUNTIME_MIN_BUN_VERSION
bunRuntime = "1.3.14"     # runtime.bunVersion (actual dev default)
effect = "3.21.3"         # dependency
typescript = "5.9.3"      # devDependency
oxfmt = "0.53.0"          # devDependency (formatter)
oxlint = "1.69.0"         # devDependency (linter)
tuningSet = "1.4.1"       # bunfig KIMI_TUNING_SET_VERSION
contractSchema = "1.0.0"  # bunfig KIMI_CONTRACT_SCHEMA_VERSION

# ── Operational defaults ─────────────────────────────────────────────────
# Runtime defaults surfaced from source code so dx table can audit drift
# without grep.  Values are the canonical defaults; governor overrides in
# ~/.kimi-code/governor/defaults.toml take precedence at runtime.
[defaults]
# tool-runner.ts
toolTimeoutMs = 30000
agentToolTimeoutMs = 15000
toolGracePeriodMs = 5000
toolMaxOutputBytes = 1048576

# process-utils.ts / memory-budget.ts
processCacheTtlMs = 1000

# governor-config.ts BUILTIN_DEFAULTS
governorMaxMemoryMB = 512
governorMaxCpuTimeMs = 30000
governorMaxParallelJobs = 2
governorCacheTTLSeconds = 300
governorWallClockMs = 300000
governorMaxFileSizeMB = 100
governorMaxOpenFiles = 256
governorDiskQuotaMB = 1024

# cloudflare-access.ts / cloudflare-access-policy.ts
cloudflareTimeoutMs = 30000
cloudflareRetries = 2
cloudflareBaseDelayMs = 500
cloudflareTokenWarnDays = 30

# context-bloat-lint.ts
agentsMaxLines = 900
contextMaxLines = 120

# herdr orchestrator dashboard (dx.config.toml herdr.orchestrator.dashboard mirrors these)
discoveryCacheTtlMs = 5000
dashboardStaleMs = 15000

[runtime]
containers = "none"
packageManager = "bun"
bunVersion = "1.4.0"
install = "bun install --frozen-lockfile"
globalFirst = true

[repository]
canonicalPath = "~/kimi-toolchain"
remote = "https://github.com/brendadeeznuts1111/kimi-toolchain.git"
defaultBranch = "main"
codeowners = ".github/CODEOWNERS"

[github]
# Server CI is disabled because the GitHub account is locked due to a billing issue.
# Enforcement happens locally via pre-push hooks and `bun run ci:local`.
workflow = ".github/workflows-disabled/ci.yml"
setupAction = ".github/actions/setup/action.yml"
protectedBranches = ["main", "master"]
permissions = ["contents:read", "checks:write", "pull-requests:write"]

[github.ci]
disabled = true
bunVersion = "1.4.0"
qualityJob = "quality"
qualityTimeoutMinutes = 15
governanceJob = "governance"
governanceTimeoutMinutes = 5

[github.ci.quality]
format = "bun run format:check:ci"
lint = "bun run lint"
typecheck = "bun run typecheck"
tests = "bun run test:coverage:ci"
smoke = "bun run test:smoke"
configStatus = "bun run config:status"

[github.ci.governance]
rScore = "bun run governance score --min 60"

# Local Bun CI replaces GitHub Actions when billing blocks Actions runners.
[github.ci.local]
quality = "bun run ci:local --job quality"
governance = "bun run ci:local --job governance"
full = "bun run ci:local"
prDiff = "bun run pr:diff"
prStatus = "bun run pr:status"
mergeGate = "local-ci"

[cloudflare]
mode = "read-only"
accountIdEnv = "CLOUDFLARE_ACCOUNT_ID"
apiTokenEnv = "CLOUDFLARE_API_TOKEN"

[cloudflare.dashboard]
enabled = true
title = "DX Dashboard"
homepagePath = "/"
source = "snapshot"
snapshotCommand = "kimi-cloudflare-access dashboard --json"
access = "cloudflare-sso"

[cloudflare.domain]
managed = true
zone = ""
hostname = ""
accessRequired = true
tls = "managed"

[cloudflare.access]
policyFile = ".cloudflare-access.yml"
appLauncherVisible = true
sessionDuration = "24h"

[cloudflare.mcp]
server = "cloudflare-api"
url = "https://mcp.cloudflare.com/mcp"
auth = "cloudflare-sso-oauth"
readOnlyByDefault = true
mutationMode = "manual-script"

[quality]
formatter = "oxfmt"
linter = "oxlint"
formatCheck = "bun run format:check"
lintCheck = "bun run lint"
lintTerms = "bun run lint:terms"
typecheck = "bun run typecheck"
check = "bun run check"
checkFast = "bun run check:fast"
checkDryRun = "bun run check:dry-run"
testFast = "bun run test:fast"
testCoverage = "bun run test:coverage"
testCoverageFast = "bun run test:coverage:fast"
testCoverageCi = "bun run test:coverage:ci"
formatCheckCi = "bun run format:check:ci"
docsSync = "bun run docs:sync"

[dx.propertyTable]
file = "test/fixtures/property-table-target.ts"
class = "DemoConfig"
output = "docs/table-DemoConfig.md"

# URL endpoint inventory (dx:table extract dx.config.toml endpoints --decompose-urls)
[[endpoints]]
name = "cloudflare-mcp"
url = "https://mcp.cloudflare.com/mcp"

[[endpoints]]
name = "herdr-skill"
url = "https://github.com/ogulcancelik/herdr/blob/d998753efe506a04c80306795efc72bff60bb0ec/SKILL.md"

[agents]
firstRead = ["/Users/nolarose/.config/dx/AGENTS.md", "AGENTS.md", "CODE_REFERENCES.md", "skills/herdr/SKILL.md"]
bootstrap = [
  "dx setup",
  "dx context",
  "dx config --project .",
  "dx mcp-status",
  "dx cli",
  "dx package",
]
iterate = "bun run check:fast"
fullValidation = "bun run check"
prePush = [
  "kimi-githooks doctor",
  "bun run check:fast",
  "kimi-guardian check",
  "kimi-doctor --effect-gates",
  "kimi-governance score",
]
handoff = ["bun run sync && bun run sync:verify", "kimi-doctor --agent-ready"]
avoid = ["docker", "sync daemon unless actively developing the toolchain runtime"]

[agents.skills.herdr]
pinned = true
path = "skills/herdr/SKILL.md"
canonical = "~/.config/agents/skills/herdr/SKILL.md"
upstream = "https://github.com/ogulcancelik/herdr"
commit = "d998753efe506a04c80306795efc72bff60bb0ec"
url = "https://github.com/ogulcancelik/herdr/blob/d998753efe506a04c80306795efc72bff60bb0ec/SKILL.md"

[finishWork]
gates = [
  "bun run check:fast",
  "kimi-doctor --effect-gates",
  "kimi-doctor --automation",   # self-contained — no 18412
  "kimi-heal effect audit",
]
# --dashboard-meta moved out of default finish-work; Herdr orchestrator bootstrap

[finishWork.followUp]
command = "kimi-doctor --effect-floor"

[sync]
command = "bun run sync"
verify = "bun run sync:verify"
managedRuntime = "~/.kimi-code"
manifest = "~/.kimi-code/toolchain-manifest.json"

[release]
publish = "manual-only"
artifactUpload = "manual-only"
preflight = "release-preflight --project ."
pack = "artifact-pack --project ."
verify = "artifact-verify --project ."

[kimi]
memoryGate = true
preflight = true

# Herdr workspace layout — single source of truth (herdr-project reads [herdr] only):
#   agents tab: [herdr.agentsTab] + [[herdr.agentsTab.panes]] (canonical pane layout spec)
#   Legacy shorthand: primaryAgent, shellPane, shellSplit, secondaryAgents (runner uses these today)
#   Extra tabs: [[herdr.tabs]] — one pane per tab (doctor, shell, reviewer, …)
[herdr]
enabled = true
skillPath = "~/.config/agents/skills/herdr/SKILL.md"
skillUpstream = "https://github.com/ogulcancelik/herdr/blob/d998753efe506a04c80306795efc72bff60bb0ec/SKILL.md"
# Herdr server session: "" or omit = primary (~/.config/herdr/herdr.sock, live wB workspace).
# "dev" = named session (~/.config/herdr/sessions/dev/herdr.sock). CLI + watch-events socket must match.
session = ""
workspaceLabel = "kimi-toolchain"
primaryAgent = "kimi"
secondaryAgents = ["codex"]
shellPane = true
shellSplit = "right"
bootstrap = [
  "dx config --project .",
  "echo '[kimi-toolchain] Available commands:'",
  "echo '  bun run check:fast        # lint + typecheck'",
  "echo '  bun run test:ci           # full test suite with coverage'",
  "echo '  kimi-doctor --effect-gates # verify Effect discipline'",
  "echo '  kimi-heal effect audit    # scan for bare promises'",
  "echo '  bun run finish-work --message \"...\"  # gates + commit'",
  "bun run check:fast && echo '✅ Ready to commit'",
  "herdr-orchestrator watch-events . >/tmp/herdr-orchestrator-events.log 2>&1 &",
]

[herdr.agentsTab]
label = "agents"

[[herdr.agentsTab.panes]]
role = "primary"
agent = "kimi"
context = "kimi-doctor --workspace-context --brief --write-context-files"
requires = ["git", "kimi-doctor"]
# ratio = 0.6  # advisory — runner does not pass --ratio yet

[[herdr.agentsTab.panes]]
role = "shell"
split = "right"
# bootstrap commands run in the shell pane

[[herdr.agentsTab.panes]]
role = "secondary"
agent = "codex"
split = "right"
context = "kimi-doctor --workspace-context --brief --write-context-files"
requires = ["git", "kimi-doctor"]

[herdr.orchestrator]
enabled = true
contextOnIdle = true
handoffFrom = "kimi"
handoffTo = "codex"
reviewerTab = "reviewer"

# Remote fleet — alias labels used by herdr-orchestrator and `herdr --remote <alias>`.
# Requires matching `Host <alias>` stanzas in ~/.ssh/config (see commented scaffold there).
# Verify: herdr-orchestrator check-hosts --versions
[herdr.orchestrator.remote_hosts]
staging = "staging"   # local SSH alias → localhost (testing remote bootstrap pipeline)
# workbox = "workbox"   # shorthand when Host alias == label
#
# [herdr.orchestrator.remote_hosts.staging]
# host = "staging.example.com"
# user = "deploy"
# port = 22
# identity_file = "~/.ssh/id_ed25519"

# Dashboard WebView / HTTP server tuning (SSE poll + stale heartbeat overlay)
[herdr.orchestrator.dashboard]
webview = true          # herdr-orchestrator dashboard → Bun.WebView (no --webview flag needed)
stale_ms = 15000
sse_poll_ms = 5000      # server agent-discovery SSE interval
poll_hint_ms = 5000     # browser handoffs/rules poll interval
persist_profile = true  # ~/.kimi-code/var/herdr-orchestrator-dashboard-webview

[herdr.orchestrator.events]
enabled = true
debounceMs = 2000
gitRefCooldownMs = 5000   # dedupe git.ref.changed per (repo, HEAD); min 1000, max 30000
allowlist = ["workspace.updated", "reviewer.feedback.processed", "pane.agent_status_changed", "effect.gates.changed", "git.ref.changed"]
watchGit = true

# Cross-workspace handoff rules — labels resolve via herdr agent rename
[[herdr.orchestrator.handoff_rules]]
from_workspace = "w1"
from_agent = "test-agent"
condition = "done"
to_workspace = "w1"
to_agent = "kimi"

# Post-review codex handoff — reviewer marks resolved, kimi idle, handoff candidate ready.
# Label: herdr agent rename wB:p6G codex-primary
# Probe: finish-work:handoff-ready (shouldHandoff) + when gates review + pane status
[[herdr.orchestrator.handoff_rules]]
from_workspace = "wB"
from_agent = "kimi"
condition = "finish-work:handoff-ready"
when = { finishWorkReport.review.resolved = true, pane.status = "idle" }
to_workspace = "wB"
to_agent = "codex-primary"

# Immediate clean close (no reviewer) — enable instead of post-review rule above if desired
# [[herdr.orchestrator.handoff_rules]]
# from_workspace = "wB"
# from_agent = "kimi"
# to_workspace = "wB"
# to_agent = "codex-primary"
# when = { finishWorkReport.outcome = "clean", finishWorkReport.handoffCandidate.shouldHandoff = true }

# Legacy probe equivalent
# [[herdr.orchestrator.handoff_rules]]
# from_workspace = "wB"
# from_agent = "kimi"
# condition = "finish-work:clean"
# to_workspace = "wB"
# to_agent = "codex-primary"

# Dirty close → reviewer tab agent (finish-work escalates; probe gates optional handoff text)
# [[herdr.orchestrator.handoff_rules]]
# from_workspace = "wB"
# from_agent = "kimi"
# condition = "finish-work:dirty"
# to_workspace = "wB"
# to_agent = "reviewer"

# Cross-host + workspace-scoped least-busy codex (requires staging remote + open workspace)
# [[herdr.orchestrator.handoff_rules]]
# from_workspace = "wB"
# from_agent = "kimi"
# condition = "done"
# to_session = "staging:default"
# to_workspace = "staging"
# to_agent = "codex"
# target_strategy = "least_busy"

# Optional: cache alignment pre-check (diagnostic — use react --all --dry-run)
# [[herdr.orchestrator.handoff_rules]]
# from_workspace = "wB"
# from_agent = "kimi"
# condition = "probe:canonical-references:runtime-aligned"
# to_workspace = "wB"
# to_agent = "codex-primary"



[[herdr.tabs]]
label = "doctor"
command = "kimi-doctor --watch"

[[herdr.tabs]]
label = "shell"
command = "git status -sb; herdr-quickref"

# Scaffold v2 — grok --role for first-class agent semantics (live validation)
[[herdr.tabs]]
label = "test"
command = "grok --role test-agent --cwd . -- bun run scripts/test-agent.ts --watch"

# Created on demand by finish-work when post-push tree is dirty (no static command).
[[herdr.tabs]]
label = "reviewer"

# Dashboard — persistent Bun.WebView shell (profile under ~/.kimi-code/var/)
[[herdr.tabs]]
label = "dashboard"
command = "herdr-orchestrator dashboard . --webview --persist --sessions"

# Control plane — cross-workspace observability and coordination (Phase 3)
[[herdr.tabs]]
label = "control"
command = "watch -n 10 'herdr-orchestrator dashboard --sessions'"

# ═══════════════════════════════════════════════════════════════════════════
# Herdr Orchestrator — Remote Session Management Configuration Reference
# ═══════════════════════════════════════════════════════════════════════════
#
# Full documentation: see UNIFIED.md and herdr-orchestrator --help.
#
# ── Quickstart ─────────────────────────────────────────────────────────────
#
# 1. Add remote hosts:
#
#    [herdr.orchestrator.remote_hosts]
#    staging = "staging.example.com"
#
#    [herdr.orchestrator.remote_hosts.workbox]
#    host = "workbox.local"
#    port = 2222
#    user = "deploy"
#    identity_file = "~/.ssh/workbox_key"
#
# 2. Verify connectivity:
#
#    herdr-orchestrator check-hosts --versions
#
# 3. View the resolved dashboard:
#
#    herdr-orchestrator dashboard --sessions
#
# ── Domains ────────────────────────────────────────────────────────────────
#
# Group hosts into domains with shared defaults, rules, and notifications:
#
#    [herdr.orchestrator.domains.staging]
#    hosts = ["staging-1", "staging-2"]
#
#    [herdr.orchestrator.domains.staging.defaults]
#    batch_mode = true
#    server_alive_interval = 30
#
#    [herdr.orchestrator.domains.staging.notifications]
#    webhook_url = "https://hooks.slack.com/services/..."
#    on_spawn = true
#
#    [[herdr.orchestrator.domains.staging.handoff_rules]]
#    from_workspace = "w1"
#    from_agent = "kimi"
#    condition = "done"
#    to_workspace = "w1"
#    to_agent = "codex"
#
# ── Handoff Rules ──────────────────────────────────────────────────────────
#
# Cross-workspace, cross-host handoff with auto-spawn:
#
#    [[herdr.orchestrator.handoff_rules]]
#    from_workspace = "w1"
#    from_agent = "kimi"
#    condition = "done"
#    to_session = "staging:dev"
#    to_workspace = "w1"
#    to_agent = "codex"
#    spawn_if_missing = true
#
# Spawn fallback — create a new agent when no candidates exist:
#
#    [[herdr.orchestrator.handoff_rules]]
#    from_workspace = "w1"
#    from_agent = "reviewer"
#    condition = "blocked > 5m"
#    to_workspace = "w1"
#    to_agent = "least_busy:reviewer"
#
#    [herdr.orchestrator.handoff_rules.spawn_fallback]
#    host = "staging"
#    session = "dev"
#    agent_cli = "kimi"
#    label = "reviewer-2"
#    workspace = "w1"
#
# ── SSH Defaults ───────────────────────────────────────────────────────────
#
# Global defaults (merged with ~/.config/herdr/config.toml [remote]):
#
#    [herdr.orchestrator.remote_defaults]
#    timeout = 30
#    batch_mode = true
#    connect_timeout = 5
#    identity_file = "~/.ssh/id_ed25519"
#    strict_host_key_checking = "accept-new"
#    server_alive_interval = 60
#    control_master = "auto"
#    control_path = "~/.ssh/control/%C"
#    control_persist = 600
#    compression = true
#    proxy_jump = "bastion.internal"
#
# Env var overrides (highest priority):
#   HERDR_SSH_PORT=2222
#   HERDR_SSH_USER=ci-runner
#   HERDR_SSH_TIMEOUT=30
#   HERDR_SSH_IDENTITY_FILE=~/.ssh/ci_key
#   HERDR_SSH_STRICT_HOST_KEY_CHECKING=no
#
# ── Notifications ──────────────────────────────────────────────────────────
#
# Webhook for handoff / spawn / error events:
#
#    [herdr.orchestrator.notifications]
#    webhook_url = "https://hooks.slack.com/services/T00/B00/xxx"
#    on_handoff = true
#    on_spawn = true
#    on_error = true
#
# ── Commands ───────────────────────────────────────────────────────────────
#
# Remote agent lifecycle:
#   herdr-orchestrator agent start|stop|restart|upgrade <name> --host <h>
#   herdr-orchestrator agent list|get|explain|rename|wait --host <h>
#   herdr-orchestrator agent send|exec|log --host <h> -- <text/command>
#
# Remote workspace/pane/terminal/plugin:
#   herdr-orchestrator workspace list|worktrees|tabs|panes --host <h>
#   herdr-orchestrator workspace pane-get|pane-read|pane-run --host <h>
#   herdr-orchestrator workspace pane-send|pane-send-keys --host <h>
#   herdr-orchestrator workspace wait-output|wait-agent-status --host <h>
#   herdr-orchestrator workspace plugins|plugin-* --host <h>
#
# Observability:
#   herdr-orchestrator dashboard --sessions [--host <h>] [--domain <d>] [--include-doctor]
#   herdr-orchestrator check-hosts --versions
#   herdr-orchestrator config show|herdr|reload
#   herdr-orchestrator history [--limit 20]
#   herdr-orchestrator status --daemon
#
# Control plane:
#   herdr-orchestrator react --all --dry-run
#   herdr-orchestrator check-sessions
#   herdr-orchestrator watch-events
