[install]
# Trusted dependencies with postinstall scripts
# Run `kimi-guardian check` to auto-populate
trustedDependencies = []

# Supply-chain hardening (aligned with root policy)
frozenLockfile = true
saveTextLockfile = true
ignoreScripts = false
minimumReleaseAge = 259200

# linker, globalStore, cache.dir — inherit from ~/.bunfig.toml when present

[run]
noOrphans = true

[install.cache]
# Global cache directory (shared across projects)

[test]
# Unit tests run concurrently; smoke tests stay sequential
concurrentTestGlob = ["test/*.unit.test.ts"]
coverageSkipTestFiles = true

coverageThreshold = { lines = 0.35, functions = 0.25 }

# Bun v1.3.13 test runner enhancements:
# --isolate    : fresh global per file (drains microtasks, kills timers, closes sockets)
# --parallel=N : distribute across N workers (default = CPU count)
# --shard=M/N  : split across CI runners (deterministic round-robin)
# --changed    : only run tests affected by git changes
# https://bun.com/blog/bun-v1.3.13#bun-test---isolate-and-bun-test---parallel
