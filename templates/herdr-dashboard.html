<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Herdr Orchestrator Dashboard</title>
    <link rel="stylesheet" href="/herdr-dashboard.css" />
  </head>
  <body>
    <header>
      <h1>Herdr Orchestrator Dashboard</h1>
      <div class="header-meta">
        <div id="agent-thumb-wrap" class="thumb-slot" aria-hidden="true">
          <img id="agent-thumb" alt="Agent preview" width="160" height="90" decoding="async" />
        </div>
        <div>
          <div id="meta">loading…</div>
          <div id="stream-status">SSE connecting…</div>
        </div>
      </div>
    </header>
    <nav>
      <button class="active" data-tab="agents">Agents</button>
      <button data-tab="handoffs">Handoff history</button>
      <button data-tab="rules">Rules</button>
    </nav>
    <main>
      <section id="agents" class="panel active">
        <div id="agents-error" class="error"></div>
        <div class="scroll agents-scroll">
          <table>
            <thead>
              <tr>
                <th>Host</th>
                <th>Session</th>
                <th>Workspace</th>
                <th>Agent</th>
                <th>Status</th>
                <th>Pane</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="agents-body">
              <tr class="skeleton-row">
                <td colspan="7" class="empty-state">Loading agents…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
      <section id="handoffs" class="panel">
        <div class="scroll">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Workspace</th>
                <th>Agent</th>
                <th>Action</th>
                <th>Detail</th>
                <th>OK</th>
              </tr>
            </thead>
            <tbody id="handoffs-body"></tbody>
          </table>
        </div>
      </section>
      <section id="rules" class="panel">
        <div id="rules-meta" class="rules-meta-slot" aria-hidden="true"></div>
        <div class="scroll">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Condition</th>
                <th>Last fired</th>
                <th>Last action</th>
                <th>OK</th>
              </tr>
            </thead>
            <tbody id="rules-body"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/herdr-dashboard.js" defer></script>
  </body>
</html>
