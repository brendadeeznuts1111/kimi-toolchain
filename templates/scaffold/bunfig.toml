[install]
# Trusted dependencies with postinstall scripts
# Run `kimi-guardian check` to auto-populate
trustedDependencies = []

# Supply-chain hardening (aligned with root policy)
frozenLockfile = true
saveTextLockfile = true
ignoreScripts = false
minimumReleaseAge = 259200

# Isolated linker: dramatically faster in peer-heavy monorepos.
linker = "isolated"
# Bun ≥1.3.14 — shared virtual store for warm installs (~7× faster)
globalStore = true

[install.cache]
# Global cache directory (shared across projects)

[run]
noOrphans = true

[test]
# Unit tests run concurrently; smoke tests stay sequential
concurrentTestGlob = ["test/*.unit.test.ts"]
coverageSkipTestFiles = true

coverageThreshold = { lines = 0.35, functions = 0.25 }
