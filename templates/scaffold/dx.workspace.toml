# dx/workspace.toml — layout + intent spec (toolchain profile)
# Runtime: mirror tab commands in dx.config.toml [herdr] for herdr-project bootstrap.
schemaVersion = 1
layoutVersion = "1.5.4"
description = "Toolchain-native workspace: agents, doctor, shell"

[[tabs]]
label = "agents"
primaryPane = { role = "agent", agent = "kimi", share = 60, command = "kimi" }
shellPane = { role = "shell", share = 40, split = "right", command = "bun run check:fast && echo '✅ Ready to commit'" }
secondaryPane = { role = "agent", agent = "codex", share = 40, split = "right", command = "codex" }

[[tabs]]
label = "doctor"
command = "kimi-doctor --quick"

[[tabs]]
label = "shell"
command = "git status -sb"

[shellBootstrap]
commands = [
  "dx config --project .",
  "echo '[{{PROJECT_NAME}}] Available commands:'",
  "echo '  bun run check:fast        # lint + typecheck'",
  "echo '  bun run finish-work --message \"...\"  # gates + commit'",
]
