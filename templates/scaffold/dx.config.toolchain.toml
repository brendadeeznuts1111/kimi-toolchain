# Project DX + kimi runtime policy (toolchain profile — opt-in via kimi-fix --profile toolchain)
# For sync/ci.local runtime parity see the kimi-toolchain reference dx.config.toml.
schemaVersion = 1
scope = "project"
mode = "development"

[runtime]
containers = "none"
packageManager = "bun"
bunVersion = "1.3.14"
install = "bun install --frozen-lockfile"
globalFirst = true

[github]
workflow = ".github/workflows/ci.yml"
setupAction = ".github/actions/setup/action.yml"
protectedBranches = ["main", "master"]
permissions = ["contents:read", "checks:write", "pull-requests:write"]

[github.ci]
bunVersion = "1.3.14"
qualityJob = "quality"
qualityTimeoutMinutes = 15
governanceJob = "governance"
governanceTimeoutMinutes = 5

[github.ci.quality]
format = "bun run format:check:ci"
lint = "bun run lint"
typecheck = "bun run typecheck"
tests = "bun run test:coverage:ci"

[github.ci.governance]
rScore = "bun run governance score --min 60"

[cloudflare]
mode = "read-only"
accountIdEnv = "CLOUDFLARE_ACCOUNT_ID"
apiTokenEnv = "CLOUDFLARE_API_TOKEN"

[cloudflare.dashboard]
enabled = true
title = "DX Dashboard"
homepagePath = "/"
source = "snapshot"
snapshotCommand = "kimi-cloudflare-access dashboard --json"
access = "cloudflare-sso"

[cloudflare.domain]
managed = true
zone = ""
hostname = ""
accessRequired = true
tls = "managed"

[cloudflare.access]
policyFile = ".cloudflare-access.yml"
appLauncherVisible = true
sessionDuration = "24h"

[cloudflare.mcp]
server = "cloudflare-api"
url = "https://mcp.cloudflare.com/mcp"
auth = "cloudflare-sso-oauth"
readOnlyByDefault = true
mutationMode = "manual-script"

[quality]
formatter = "oxfmt"
linter = "oxlint"
formatCheck = "bun run format:check"
lintCheck = "bun run lint"
lintTerms = "bun run lint:terms"
typecheck = "bun run typecheck"
check = "bun run check"
checkFast = "bun run check:fast"
checkDryRun = "bun run check:dry-run"
testFast = "bun run test:fast"
testCoverage = "bun run test:coverage"
testCoverageFast = "bun run test:coverage:fast"
testCoverageCi = "bun run test:coverage:ci"
formatCheckCi = "bun run format:check:ci"
docsSync = "bun run docs:sync"

[agents]
firstRead = ["{{DX_AGENTS_PATH}}", "AGENTS.md", "CODE_REFERENCES.md"]
bootstrap = [
  "dx setup",
  "dx context",
  "dx config --project .",
  "dx mcp-status",
  "dx cli",
  "dx package",
]
iterate = "bun run check:fast"
fullValidation = "bun run check"
prePush = [
  "kimi-githooks doctor",
  "bun run check:fast",
  "kimi-guardian check",
  "kimi-doctor --effect-gates",
  "kimi-governance score",
]
handoff = ["kimi-doctor --agent-ready"]
avoid = ["docker", "sync daemon unless actively developing runtime tooling"]

[finishWork]
gates = ["bun run check:fast", "kimi-doctor --effect-gates"]

[kimi]
memoryGate = true
preflight = true

# Herdr workspace layout — single source of truth (herdr-project reads [herdr] only):
#   Tab "agents" (default): primaryAgent + shellPane (split shellSplit) + secondaryAgents
#   Extra tabs: [[herdr.tabs]] (doctor, shell, …)
[herdr]
enabled = true
workspaceLabel = "{{PROJECT_NAME}}"
primaryAgent = "kimi"
secondaryAgents = ["codex"]
shellPane = true
shellSplit = "right"
bootstrap = [
  "dx config --project .",
  "echo 'Finish work: bun run finish-work --message \"...\"'",
  "bun run check:fast && echo '✅ Ready to commit'",
]

[[herdr.tabs]]
label = "doctor"
command = "kimi-doctor --quick 2>/dev/null || true"

[[herdr.tabs]]
label = "shell"
command = "git status -sb; herdr-quickref"

[[herdr.tabs]]
label = "reviewer"
