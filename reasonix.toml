# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 3 # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
# system_prompt_file = "prompts/system.md"   # overrides system_prompt when set
# max_steps         = 0   # executor tool-call rounds; 0 = no limit
# planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature = 0.0
auto_plan = "off" # off|on; off keeps plan mode manual
# reasoning_language = "zh"   # visible reasoning language: auto|zh|en
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio = 0.5 # notice only; keeps cache-first prefix intact
compact_ratio = 0.8 # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9 # force compacting at this high-water mark
# keep                = ["errors"]   # compaction keep policy: errors, user_marked
# recent_keep         = 2   # minimum recent messages kept verbatim
cold_resume_prune = true # elide stale tool results when reopening a session past the provider cache window
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
# output_style = "explanatory"   # explanatory | learning | concise | custom; empty = default

[tools]
enabled = [] # empty = all built-in tools
bash_timeout_seconds = 120 # foreground safety cap; set 0 for no tool-local cap

[tools.background_jobs]
stalled_warning_seconds = 900 # warn once per background job after this many quiet seconds; 0 disables

[lsp]
enabled = true # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
paths = ["skills"] # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode = "ask"
# deny = ["Bash(rm -rf*)", "Bash(git push*)"]   # hard-blocked in every mode
allow = [
  "Bash(bun run:*)",
  "Bash(bun test:*)",
  "Bash(bun run check:*)",
  "Bash(bun run sync:*)",
  "Bash(git status:*)",
  "Bash(git diff:*)",
  "Bash(git log:*)",
  "Edit",
  "Bash(cd ~/kimi-toolchain && rm test-setup.ts)",
  "Bash(cd ~/kimi-toolchain && bun run typecheck 2>&1 && bun run format:check 2>&1 | tail -3 && bun test test/mcp-config.unit.test.ts test/hook-gates.unit.test.ts test/governance-preflight.unit.test.ts test/r-score.unit.test.ts test/governance-check.unit.test.ts 2>&1 | tail -5)",
  "Bash(cd ~/kimi-toolchain && grep -rn 'test-setup' --include='*.ts' --include='*.toml' --include='*.json' --include='*.md' . 2>&1)",
  "Bash(cd ~/kimi-toolchain && ls test-setup.ts 2>&1)",
  "Bash(cd ~/kimi-toolchain && git status --short 2>&1)",
  "Bash(cd ~/kimi-toolchain && git add AGENTS.md CONTEXT.md bunfig.toml src/bin/kimi-governance.ts src/lib/governance-preflight.ts src/lib/hook-gates.ts test-setup.ts test/mcp-config.unit.test.ts test/setup.ts test/testing.md && git diff --cached --stat 2>&1)",
  "Bash(cd ~/kimi-toolchain && git commit -m 'feat: add sandbox tolerance escape hatches for tests and hooks\n\n- KIMI_SANDBOX_MODE=1: test/setup.ts forces HOME to OS-tmpdir via bunfig preload\n- KIMI_SKIP_FLAKY_TESTS=1: hook-gates tolerates EPERM/EACCES/sandbox in test:fast, check:fast, r-score\n- KIMI_REAL_HOME stashed before HOME override for path-utility tests\n- Collapse test-setup.ts → test/setup.ts in bunfig preload (remove delegation hop)\n- EPERM guards in kimi-governance.ts (score+coverage history) and governance-preflight.ts (guardian baseline)\n- mcp-config test uses withEnv({ HOME: tmpHome }) consistently' 2>&1)",
  "Bash(ls -la /Users/nolarose/.reasonix/ 2>/dev/null || echo \"Directory does not exist\")",
  "Bash(which reasonix 2>/dev/null && reasonix --help 2>&1 | head -60)",
  "Bash(which reasonix 2>/dev/null && reasonix help hooks 2>&1 || reasonix settings --help 2>&1 | head -40)",
  "Bash(find /Applications -name \"*Reasonix*\" -o -name \"*reasonix*\" 2>/dev/null | head -5)",
  "Bash(find /Applications/Reasonix.app -name \"*.md\" -o -name \"*.html\" -o -name \"*help*\" -o -name \"*docs*\" 2>/dev/null | head -20)",
  "Bash(find /Applications/Reasonix.app/Contents/Resources/data -name \"*.md\" -o -name \"*hook*\" 2>/dev/null | head -20)",
  "Bash(find /Applications/Reasonix.app/Contents/Resources -type f -name \"*.json\" 2>/dev/null | head -20)",
  "Bash(grep -r \"hook\" /Applications/Reasonix.app/Contents/Resources/dist/cli/ 2>/dev/null | grep -i \"event\\|pre_\\|post_\\|before\\|after\\|on_turn\\|on_tool\" | head -30)",
  "Bash(find /Applications/Reasonix.app -name \"*.html\" -o -name \"*.md\" 2>/dev/null | head -20)",
  "Bash(find /Applications/Reasonix.app/Contents/Resources -name \"*.js\" -type f 2>/dev/null | head -10)",
  "Bash(grep -o '\"hook\"[^}]*' /Applications/Reasonix.app/Contents/Resources/dist/index.js 2>/dev/null | head -50)",
  "Bash(grep -oP '\"[a-z_]+_hook[s]?\"' /Applications/Reasonix.app/Contents/Resources/dist/index.js 2>/dev/null | sort -u | head -30)",
  "Bash(strings /Applications/Reasonix.app/Contents/Resources/dist/index.js 2>/dev/null | grep -i \"hook\" | head -30)",
  "Bash(strings /Applications/Reasonix.app/Contents/Resources/dist/index.js 2>/dev/null | grep -i \"PreToolUse\\|PostToolUse\\|UserPromptSubmit\\|Stop\\|before_tool\\|after_tool\\|turn_start\\|turn_end\\|session\\|compact\" | head -40)",
  "Bash(strings /Applications/Reasonix.app/Contents/Resources/dist/index.js 2>/dev/null | grep -A2 -B2 \"PreToolUse\\|PostToolUse\" | head -40)",
  "Bash(strings /Applications/Reasonix.app/Contents/Resources/dist/index.js 2>/dev/null | grep -A15 \"HOOK_EVENTS\\|HOOK_SETTINGS\\|DEFAULT_TIMEOUTS\\|PreToolUse\":\\|event.*:\" | head -80)",
]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit/move_file)
# may only write under workspace_root (empty = current dir) and allow_write extras.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

# External MCP servers. type: "stdio" (default, a subprocess) | "http" | "sse".
# ${VAR} / ${VAR:-default} are expanded from the environment in command/args/env/url/headers.
