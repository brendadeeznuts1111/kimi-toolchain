# Bun-native lint policy — phased enforcement for scripts/lint-bun-native.ts
# Rule modes: off | report | enforce
#   off      — rule is not scanned
#   report   — violations are baselined; gate fails only on NEW violations
#   enforce  — zero tolerance (baseline does not apply)
#
# Batch workflow:
#   1. bun run bun-native:batch <rule-id>
#   2. fix files
#   3. bun run bun-native:baseline -- --rule <rule-id>
#   4. when count is 0, promote rule to enforce here

schemaVersion = 1

exemptFiles = ["src/lib/bun-native-shim.ts", "src/lib/bun-io.ts", "src/lib/http-client.ts"]

[gate]
mode = "check" # check | report

[rules]
banned-import = "enforce"
banned-require = "report"
process-env = "enforce"
stringify-stdout = "report"
sync-fs-api = "enforce"
sleep-settimeout = "enforce"
process-argv = "enforce"
response-stream-text = "enforce"
spawn-no-orphans = "report"
soft-banned-import = "report"
buffer-from = "report"
shell-template-opportunity = "report"

# Per-scope overrides: relax enforce rules to report for scripts/ and examples/
# so broader coverage doesn't break the gate while those directories are migrated.
[scopeOverrides]
"process-env" = { "scripts/" = "report", "examples/" = "report" }
"process-argv" = { "scripts/" = "report", "examples/" = "report" }
"sync-fs-api" = { "scripts/" = "report", "examples/" = "report" }
"sleep-settimeout" = { "scripts/" = "report", "examples/" = "report" }
"banned-import" = { "scripts/" = "report", "examples/" = "report" }
"response-stream-text" = { "examples/" = "report" }
