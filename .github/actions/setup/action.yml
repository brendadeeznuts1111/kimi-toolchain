name: Setup Bun + dependencies
description: Checkout, install Bun, cache, and install deps for kimi-toolchain CI

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.14"

    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.bun/install/cache
          node_modules
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'package.json') }}
        restore-keys: |
          ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          ${{ runner.os }}-bun-

    - name: Install dependencies
      shell: bash
      run: |
        bun install --frozen-lockfile
        # Ensure bun.lock mtime is not older than package.json; Bun does not
        # rewrite the lockfile on no-op installs, but governance compares mtimes.
        touch bun.lock
