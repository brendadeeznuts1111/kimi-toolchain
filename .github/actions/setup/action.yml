name: Setup Bun + dependencies
description: Checkout, install Bun, cache, and install deps for kimi-toolchain CI

runs:
  using: composite
  steps:
    - name: Configure Bun log level
      shell: bash
      run: echo "BUN_CONFIG_LOG_LEVEL=warn" >> "$GITHUB_ENV"

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.14"

    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.bun/install/cache
          node_modules
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
