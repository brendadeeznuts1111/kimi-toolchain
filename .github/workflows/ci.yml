name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Format check
        run: bun run format:check:ci

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Constants manifest verify
        run: bun run constants:verify

      - name: Unit + integration tests
        run: bun run test:coverage:ci

      - name: Smoke tests
        run: bun run test:smoke

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Bun Tests
          path: reports/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: reports/junit.xml
          if-no-files-found: ignore

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore

  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: R-Score gate (min 60)
        run: bun run governance score --min 60

  effect-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Download baseline snapshot
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v3
        with:
          branch: main
          workflow: ci.yml
          workflow_conclusion: success
          name: effect-gates-baseline
          path: .kimi/var
          if-no-files-found: ignore

      - name: Effect Gates
        run: bun run src/bin/kimi-doctor.ts --effect-gates

      - name: Upload baseline snapshot
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: effect-gates-baseline
          path: .kimi/var/effect-gates.ndjson
          if-no-files-found: ignore
