name: Audit Auto-Fix

on:
  schedule:
    - cron: "42 6 * * 1" # Weekly on Monday at 06:42 UTC
  workflow_dispatch:
    inputs:
      apply:
        description: Apply fixes (create PR)
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: audit-fix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-fix:
    name: Doctor audit with auto-fix
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Run secret audit (dry-run)
        run: bun run kimi-doctor --quick --json > audit-report.json

      - name: Apply auto-fix
        if: inputs.apply == true
        run: bun run kimi-doctor --fix --quick

      - name: Check for changes
        id: changes
        if: inputs.apply == true
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "fixed=true" >> $GITHUB_OUTPUT
          else
            echo "fixed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: inputs.apply == true && steps.changes.outputs.fixed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: auto-fix hardcoded secrets detected by doctor"
          title: "🔐 Auto-fix: Replace hardcoded secrets with environment variables"
          body: |
            ## 🔐 Auto-Fix Summary

            The doctor audit detected potential hardcoded secrets in the codebase.
            This PR automatically replaces them with `process.env.SECRET_NAME` references
            and updates `.env.example` with the corresponding entries.

            ### What changed
            - Hardcoded credential-like strings replaced with `process.env.*` references
            - `.env.example` updated with masked entries for each detected secret

            ### Next steps
            1. Review the changes for accuracy
            2. Add the actual secret values to your environment or secrets manager
            3. Remove any entries from `.audit-whitelist` that should NOT have been flagged

            ---
            *Generated by kimi-toolchain doctor audit*
          branch: audit-auto-fix
          delete-branch: true
          labels: |
            security
            automated
