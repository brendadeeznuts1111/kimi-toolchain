# dx/workspace.toml — canonical Herdr workspace layout (DxWorkspace)
# Layout + intent spec only. Runtime lives in dx.config.toml [herdr] (herdr-project reads that).
# Pane sizing (share %) is advisory — Herdr splits are even; layout documents intent.
#
# Note: [herdr].bootstrap and [[herdr.tabs]] in dx.config.toml are the runtime versions.
# They may include small hardening (error suppression, herdr-quickref, etc.) beyond this spec.
# Finish-work gates live in dx.config.toml [finishWork] — not here.

schemaVersion = 1
layoutVersion = "1.5.4"
description = "Toolchain-native workspace: agents, doctor, shell"

[[tabs]]
label = "agents"
primaryPane = { role = "agent", agent = "kimi", share = 60, command = "kimi" }
shellPane = { role = "shell", share = 40, split = "right", command = "bun run check:fast && echo '✅ Ready to commit'" }
secondaryPane = { role = "agent", agent = "codex", share = 40, split = "right", command = "codex" }

[[tabs]]
label = "doctor"
command = "kimi-doctor --quick"

[[tabs]]
label = "shell"
command = "git status -sb"

[shellBootstrap]
commands = [
  "dx config --project .",
  "echo '[kimi-toolchain] Available commands:'",
  "echo '  bun run check:fast        # lint + typecheck'",
  "echo '  bun run test:ci           # full test suite with coverage'",
  "echo '  kimi-doctor --effect-gates # verify Effect discipline'",
  "echo '  kimi-heal effect audit    # scan for bare promises'",
  "echo '  bun run build --compile   # produce single binaries'",
  "echo ''",
  "echo 'Finish work: bun run finish-work --message \"...\"'",
]