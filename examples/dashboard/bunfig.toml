# bunfig.toml — Hardened install policy for kimi-toolchain-dashboard.
# Merged with $HOME/.bunfig.toml if present. Env vars (BUN_CONFIG_*) override.
# See: https://bun.sh/docs/cli/install#configuring-bun-install-with-bunfig-toml

[install]
optional = true
dev = true
peer = true
production = false
dryRun = false
saveTextLockfile = true
frozenLockfile = true
exact = false
ignoreScripts = false
concurrentScripts = 8
linker = "isolated"
globalStore = true
globalDir = "~/.bun/install/global"
globalBinDir = "~/.bun/bin"
minimumReleaseAge = 259200
minimumReleaseAgeExcludes = ["@types/bun", "@types/node", "typescript"]

[install.cache]
dir = "~/.bun/install/cache"

[test]
pathIgnorePatterns = [
  "vendor/**",
  "submodules/**",
  "fixtures/**",
  "**/test-data/**",
  "examples/**",
]

# Console inspection depth — cli flag --console-depth overrides.
# Default 2 truncates deeply nested objects. Increase for debug sessions.
console.depth = 4

[run]
# Parent-death detection — child processes auto-exit when the parent dies.
noOrphans = true

[inspect.auto]
depth = 5
colors = true
compact = false
sorted = true
showHidden = false

[inspect.debug]
depth = "Infinity"
colors = true
compact = false
sorted = true
showHidden = true

[inspect.prod]
depth = 2
colors = false
compact = true
sorted = false
maxArrayLength = 50
showHidden = false
