# Error taxonomy for kimi-toolchain failure tracking.
# Agents can read this file to classify tool failures consistently.
# Loaded from ~/.kimi-code/error-taxonomy.yml (repo root is source of truth).
version: 2
categories:
  - id: expected_nonzero
    name: Expected non-zero exit
    description: Tool completed but returned exit code 1, typically from a check or grep with no matches.
    severity: info
    expected: true
    patterns:
      - regex: "Command failed with exit code:\\s*1\\b"
      - regex: "Process exited with code\\s+\\d+"

  - id: approval_rejected
    name: User rejected tool approval
    description: The user explicitly denied permission for a tool call.
    severity: info
    expected: true
    patterns:
      - regex: "was not run because the user rejected the approval request"
      - regex: "AskUserQuestion is disabled while auto permission mode is active"

  - id: user_interrupt
    name: User interrupted
    description: The user interrupted or cancelled the operation.
    severity: info
    expected: true
    patterns:
      - regex: "Interrupted by user"

  - id: opaque_hook_output
    name: Opaque hook failure output
    description: PostToolUseFailure logged [object Object] before formatFailureValue hardening; original error text is not recoverable from the ledger row.
    severity: info
    expected: true
    suggestion: "Historical row — ignore for clustering or delete after audit. New failures use formatFailureOutput."
    patterns:
      - regex: "^\\[object Object\\]$"

  - id: format_check_failure
    name: Format check failed
    description: oxfmt --check found formatting issues.
    severity: warn
    expected: false
    suggestion: "Run oxfmt to fix formatting issues."
    autoFix: "bun run format"
    patterns:
      - regex: "Format issues found in above"
      - regex: 'error: script "format:check" exited with code 1'
      - regex: "FAIL format:check"
      - regex: "gate failed: format:check"

  - id: constants_drift
    name: Define constants drift
    description: Build-time tuning constants manifest, parity, or tuning set version is stale or misaligned.
    severity: warn
    expected: false
    suggestion: "Regenerate constants-manifest.json and align bunfig.toml [define] with constants-parity.toml."
    autoFix: "bun run manifest:generate"
    boundConstants:
      - KIMI_TUNING_SET_VERSION
    patterns:
      - regex: "constants-manifest.json is stale"
      - regex: "lint:constant-parity failed"
      - regex: "lint:build-constants failed"
      - regex: "tuning set version"

  - id: release_metadata_drift
    name: Release metadata drift
    description: A Bun release blog post (.md) reports version, tag, or commit hash that disagrees with bun-release-registry.ts.
    severity: error
    expected: false
    suggestion: "Update BUN_RELEASE or BUN_RELEASE_HISTORY in src/lib/bun-release-registry.ts to match the shipped release, or correct the blog source."
    autoFix: "bun run scripts/head-table-typed.ts --section release --verify --md <path> --html <path>"
    patterns:
      - regex: "release_metadata_drift"
      - regex: "release commit hash mismatch"
      - regex: "release version mismatch"
      - regex: "release tag mismatch"

  - id: lint_failure
    name: Lint check failed
    description: oxlint or banned-terms check failed.
    severity: warn
    expected: false
    suggestion: "Fix lint errors reported by oxlint or banned-terms check."
    autoFix: "bun run lint"
    boundConstants:
      - KIMI_TUNING_SET_VERSION
    patterns:
      - regex: "Found\\s+\\d+\\s+warning.*error"
      - regex: 'error: script "lint" exited with code 1'
      - regex: "FAIL lint"
      - regex: "gate failed: lint"

  - id: lint_relative_import
    name: Broken relative import
    description: Discovery or lint found relative import paths that violate repo import policy.
    severity: warn
    expected: false
    suggestion: "Fix relative imports flagged by lint:discovery or align docs with actual import paths."
    autoFix: "bun run lint"
    patterns:
      - regex: "Broken relative imports found:"
      - regex: 'Relative import path ".+" not prefixed'

  - id: typecheck_failure
    name: TypeScript type check failed
    description: tsc --noEmit reported type errors.
    severity: warn
    expected: false
    suggestion: "Fix TypeScript errors before continuing."
    autoFix: "bun run typecheck"
    patterns:
      - regex: "error TS\\d+"
      - regex: 'error: script "typecheck" exited with code 1'

  - id: test_failure
    name: Test suite failed
    description: bun test reported failures.
    severity: warn
    expected: false
    suggestion: "Test failure — run 'bun test' to see details."
    autoFix: "bun test"
    docLink: "examples/what-broke.md"
    patterns:
      - regex: "\\d+ fail"
      - regex: 'error: script "test" exited with code 1'
      - regex: 'error: script "test:fast" exited with code 1'
      - regex: "test.*fail"
      - regex: "AssertionError"
      - regex: "expect.*received"
      - regex: "FAIL test:fast"
      - regex: "FAIL test\b"
      - regex: "gate failed: test:fast"
      - regex: "gate failed: test"

  - id: secrets_storage_tier_mismatch
    name: Secrets storage tier mismatch
    description: Linux env-fallback backend is active but policy secrets lack storageTier env-fallback.
    severity: warn
    expected: false
    suggestion: 'Add storageTier: "env-fallback" to CI-only secrets in secrets-policy.json5, or install libsecret.'
    autoFix: "bun run scripts/lint-secrets-registry.ts"
    patterns:
      - regex: "secrets-storage-gate failed"
      - regex: "storage_tier_mismatch"
      - regex: 'lack storageTier: "env-fallback"'

  - id: test_naming_violation
    name: Test naming violation
    description: Lint gate found test files violating naming conventions.
    severity: warn
    expected: false
    suggestion: "Fix test naming violations reported by lint:test-names."
    autoFix: "bun run lint"
    patterns:
      - regex: "Test naming violations"

  - id: edit_stale
    name: Edit old_string stale
    description: The Edit tool's old_string no longer matches the file.
    severity: warn
    expected: false
    suggestion: "Re-read the file and retry the edit with current content."
    patterns:
      - regex: "old_string not found in .+, the file contents may be out of date"

  - id: edit_ambiguous
    name: Edit match ambiguous
    description: The Edit tool found multiple matches or an identical no-op replacement.
    severity: warn
    expected: false
    suggestion: "Add surrounding context, set replace_all=true, or re-read the file before editing."
    patterns:
      - regex: "old_string is not unique"
      - regex: "No changes to make: old_string and new_string are exactly the same"

  - id: http_404
    name: HTTP 404 Not Found
    description: FetchURL received a 404 response.
    severity: warn
    expected: false
    patterns:
      - regex: "Failed to fetch URL\\. Status: 404"

  - id: http_error
    name: HTTP error (non-404)
    description: FetchURL received a non-404 HTTP error.
    severity: warn
    expected: false
    patterns:
      - regex: "Failed to fetch URL\\. Status: \\d+"

  - id: read_missing
    name: Read target missing
    description: The Read tool was asked to read a file or directory that does not exist.
    severity: warn
    expected: false
    patterns:
      - regex: "does not exist\\."
      - regex: "Directories are not supported"

  - id: write_missing_parent_dir
    name: Write missing parent directory
    description: The Write tool was asked to create a file in a directory that does not exist.
    severity: warn
    expected: false
    suggestion: "Create the parent directory before writing the file."
    patterns:
      - regex: "Parent directory does not exist"

  - id: command_not_found
    name: Command not found
    description: A shell command or executable was not found on PATH.
    severity: error
    expected: false
    suggestion: "Missing dependency or executable — run 'bun install' or verify PATH."
    autoFix: "bun install"
    patterns:
      - regex: "command not found"
      - regex: "No such file or directory"
      - regex: "Cannot find module"
      - regex: "Module not found"
      - regex: "ENOENT"

  - id: git_not_worktree
    name: Git not in work tree
    description: Git operation ran outside a git work tree (wrong cwd or detached state).
    severity: error
    expected: false
    suggestion: "Ensure the command runs from inside the repo work tree."
    patterns:
      - regex: "must be run in a work tree"
      - regex: "not a git repository"

  - id: npm_not_found
    name: NPM package not found
    description: npm registry returned 404 for a package install.
    severity: error
    expected: false
    suggestion: "Check the package name and registry availability."
    patterns:
      - regex: "npm error code E404"

  - id: shell_internal_error
    name: Unified shell internal error
    description: The unified-shell bridge returned an internal error envelope.
    severity: error
    expected: false
    suggestion: "Check the shell bridge payload and retry."
    patterns:
      - regex: '"code":"internal","message"'

  - id: permission_denied
    name: Permission denied
    description: File system or operation permission denied.
    severity: error
    expected: false
    suggestion: "Permission issue — check file ownership or use sudo if appropriate."
    patterns:
      - regex: "Permission denied"
      - regex: "permission denied"
      - regex: "EACCES"

  - id: syntax_error
    name: Syntax error
    description: TypeScript/JavaScript syntax error.
    severity: error
    expected: false
    suggestion: "Syntax error in recently changed file — check the diff."
    patterns:
      - regex: "SyntaxError"
      - regex: "Unexpected token"

  - id: type_runtime_error
    name: Runtime type error
    description: Cannot read property of undefined/null, or similar runtime type issue.
    severity: error
    expected: false
    suggestion: "Null/undefined access — add runtime checks or fix types."
    patterns:
      - regex: "TypeError.*undefined"
      - regex: "Cannot read propert"

  - id: orphan_process
    name: Orphan process
    description: A background process was found running unexpectedly.
    severity: warn
    expected: false
    suggestion: "Check for orphan processes with kimi-orphan-kill --dry-run."
    autoFix: "kimi-orphan-kill --dry-run"
    patterns:
      - regex: "orphan process"
      - regex: "orphan"

  - id: blocking_issue
    name: Blocking workspace issue
    description: Workspace health audit found a blocker.
    severity: warn
    expected: false
    patterns:
      - regex: "blocking"

  - id: preflight_check_failed
    name: Pre-flight check failed
    description: A pre-push or pre-commit gate passed governance but failed the composite check.
    severity: warn
    expected: false
    suggestion: "Run the failing gate directly to see details."
    patterns:
      - regex: "rscore FAILcheck"

  - id: merge_conflict
    name: Merge conflict
    description: Git or GitHub operation blocked by unresolved merge conflicts.
    severity: warn
    expected: false
    suggestion: "Resolve merge conflicts before retrying."
    patterns:
      - regex: "merge conflicts"
      - regex: "would be overwritten by merge"

  - id: runtime_sync_drift
    name: Runtime sync drift
    description: Repo sources changed but ~/.kimi-code/ copy or manifest hashes are stale.
    severity: warn
    expected: false
    suggestion: "Run bun run sync && bun run sync:verify before handoff."
    autoFix: "bun run sync"
    patterns:
      - regex: "Drifted desktop runtime files"
      - regex: 'error: script "sync:verify" exited with code 1'

  - id: network_timeout
    name: Network timeout
    description: Network operation timed out.
    severity: warn
    expected: false
    suggestion: "Operation timed out — check network or increase timeout."
    patterns:
      - regex: "timed out"
      - regex: "ETIMEDOUT"
      - regex: "ECONNREFUSED"
      - regex: "ENOTFOUND"
      - regex: "network.*timeout"

  - id: port_conflict
    name: Port already in use
    description: A network port or unix socket path is already bound by another process.
    severity: warn
    expected: false
    suggestion: "Port or unix socket conflict — use PORT=0 for auto-assignment, stop the bound process, or remove a stale herdr.sock after confirming no listener (Bun 1.4+ EADDRINUSE on double bind)."
    patterns:
      - regex: "port.*already in use"
      - regex: "EADDRINUSE"

  - id: herdr_socket_saturation
    name: Herdr socket saturation
    description: Herdr IPC returned EAGAIN (os error 35) — the server is overloaded with stale API or events.subscribe connections, often after long-running dashboard/orchestrator or zombie bun test load.
    severity: warn
    expected: false
    suggestion: "Diagnostic only — `herdr-doctor doctor` does not kill processes. Stop dashboard, audit orphans, `herdr server stop`, verify status, then SIGTERM only the server PID if stop was ignored. See buildHerdrSocketRecoveryPlan in src/lib/herdr-cli-error.ts."
    autoFix: "herdr-doctor fix-socket --dry-run"
    patterns:
      - regex: "herdr: protocol error.*os error 35"
      - regex: "herdr: protocol error.*Resource temporarily unavailable"
      - regex: "Resource temporarily unavailable \\(os error 35\\)"
      - regex: "\\bEAGAIN\\b"

  - id: herdr_cli_attach_refused
    name: Herdr client attach refused
    description: Herdr CLI client attach failed with connection refused (os error 61) — stale herdr-client.sock or server not accepting new clients.
    severity: warn
    expected: false
    suggestion: "Run `herdr status server`. If not running, remove stale socket and restart. Do not confuse with saturation (os error 35)."
    autoFix: "herdr-doctor fix-socket --dry-run"
    patterns:
      - regex: "herdr: protocol error.*os error 61"
      - regex: "herdr: protocol error.*Connection refused"

  - id: herdr_session_dead
    name: Herdr session not running
    description: A handoff or orchestrator rule referenced a Herdr session that is not running.
    severity: warn
    expected: false
    suggestion: "Start the referenced Herdr session or fix handoff rules in dx.config.toml."
    patterns:
      - regex: "from_session .* is not running"
      - regex: "to_session .* is not running"

  - id: memory_limit
    name: Out of memory
    description: Process hit memory limits.
    severity: error
    expected: false
    suggestion: "Memory limit hit — check for leaks or increase limit."
    patterns:
      - regex: "out of memory"
      - regex: "ENOMEM"

  - id: lockfile_issue
    name: Lockfile integrity issue
    description: Guardian detected lockfile hash mismatch or unsigned manifest.
    severity: error
    expected: false
    suggestion: "Lockfile drift — dep change: bun add / bun update (not plain bun install); baseline: kimi-guardian fix."
    autoFix: "kimi-guardian fix"
    docLink: "examples/guardian-failure.md"
    boundConstants:
      - KIMI_HOOK_VERIFIER_MAX_CYCLES
    patterns:
      - regex: "HASH MISMATCH"
      - regex: "lockfile"
      - regex: "bun\\.lock"

  - id: max_steps_exceeded
    name: Max steps per turn exceeded
    description: Agent reached the max_steps_per_turn limit before completing the task.
    severity: error
    expected: false
    suggestion: "Agent hit step limit — break work into smaller chunks. Use `bun run check:fast` instead of full suite, batch edits before testing, and avoid long-running subprocesses in a single turn."
    autoFix: "bun run check:fast"
    patterns:
      - regex: "max_steps_exceeded"
      - regex: "max steps exceeded"
      - regex: "step limit reached"
      - regex: "loop limit exceeded"
      - regex: "Turn exceeded maxSteps"

  - id: context_limit
    name: Context window limit
    description: Agent context window approached or exceeded model capacity.
    severity: error
    expected: false
    suggestion: "Reduce output verbosity, avoid reading large files in full, and use targeted reads with line offsets."
    patterns:
      - regex: "context window"
      - regex: "reserved_context_size"
      - regex: "compaction failed"

  - id: timeout_hang
    name: Subprocess timeout hang
    description: A spawned subprocess did not complete within its timeout and was killed.
    severity: warn
    expected: false
    suggestion: "Subprocess hung — check for orphan processes with `kimi-orphan-kill --dry-run`, then reduce tool timeouts or run with `--quick`."
    autoFix: "kimi-orphan-kill --dry-run"
    patterns:
      - regex: "Tool timed out after"
      - regex: "SIGTERM sent"
      - regex: "SIGKILL after"
      - regex: "Command failed with exit code:\\s*-1\\b"
      - regex: "Process exited with code -1"

  - id: signal_kill
    name: Process killed by signal
    description: A subprocess was terminated by SIGTERM or SIGKILL (often OOM, agent timeout, or manual kill).
    severity: warn
    expected: false
    suggestion: "Check memory pressure and orphan processes; retry with `kimi-orphan-kill --dry-run` and smaller gate scope."
    autoFix: "kimi-orphan-kill --dry-run"
    patterns:
      - regex: "Command failed with exit code:\\s*137\\b"
      - regex: "Command failed with exit code:\\s*143\\b"
      - regex: "Killed: 9"
      - regex: "terminated by signal SIGTERM"

  - id: bash_truncated
    name: Truncated bash output
    description: Failure output was cut off at the ledger 2000-character cap before a concluding exit summary.
    severity: info
    expected: true
    suggestion: "Historical row with incomplete output — re-run the command or inspect trace-events.jsonl for full stderr."
    patterns:
      - regex: "at <anonymous> \\(/Users/[^\\n]*$"
      - regex: "maxPixels flows through without error on all formats\\s*$"
      - regex: "✓ lib/predictive\\s*$"

  - id: mcp_config_missing
    name: MCP config missing
    description: Kimi Code MCP configuration is missing a required toolchain server registration.
    severity: warn
    expected: false
    suggestion: "Provision MCP defaults with kimi-doctor --fix or bun run sync."
    autoFix: "kimi-doctor --fix"
    patterns:
      - regex: "MCP config missing unified-shell registration"
      - regex: "unified-shell.*not configured in user MCP servers"
      - regex: "cloudflare-api.*not configured in user MCP servers"

  - id: cli_invalid_flag
    name: CLI invalid flag
    description: A tool received an unrecognized or malformed command-line flag.
    severity: error
    expected: false
    suggestion: "Check the tool help or use a supported flag."
    patterns:
      - regex: "Unknown flag"

  - id: cli_invalid_usage
    name: CLI invalid usage
    description: A CLI command was invoked with wrong arguments or subcommand.
    severity: warn
    expected: false
    suggestion: "Check the tool help for correct usage."
    patterns:
      - regex: "usage: herdr"
      - regex: "error:.*required.*argument"

  - id: perf_gate_timeout
    name: Effect benchmark run timed out
    description: The effect benchmark harness exceeded its wall-clock budget before all handlers completed.
    severity: warn
    expected: false
    suggestion: "Retry with fewer handlers, increase KIMI_EFFECT_BENCHMARK_RUN_TIMEOUT_MS, or check slow HTTP fixtures."
    patterns:
      - regex: "perf_gate_timeout"
      - regex: "benchmark run timed out"

  - id: perf_handler_failure
    name: Effect benchmark handler failure
    description: An individual registered benchmark handler threw or returned a failing metric.
    severity: error
    expected: false
    suggestion: "Inspect the handler registry key in the benchmark envelope errors[] and fix the workload or skipIf guard."
    patterns:
      - regex: "perf_handler_failure"
      - regex: "workload failed"

  - id: perf_gate_partial
    name: Effect benchmark partial success
    description: Some benchmark handlers passed while others failed or were skipped due to timeout.
    severity: warn
    expected: false
    suggestion: "Review partialSuccess and errors[] in the benchmark envelope; re-run after fixing flaky handlers."
    patterns:
      - regex: "perf_gate_partial"
      - regex: "partial benchmark run"

  - id: rate_limited
    name: Benchmark refresh rate limited
    description: Dashboard refresh or train was called before the POST cooldown elapsed.
    severity: info
    expected: true
    suggestion: "Wait for retryAfterMs in the response before calling refresh/train again."
    patterns:
      - regex: "rate_limited"
      - regex: "Rate limited"

  - id: effect_gates_threshold_exceeded
    name: Effect gates threshold exceeded
    description: An Effect gate count exceeds its constant-derived threshold.
    severity: error
    expected: false
    suggestion: "Review the gate report and reduce the flagged pattern."
    patterns:
      - regex: "effect.gates.*threshold"

  - id: effect_gates_regression_detected
    name: Effect gates regression detected
    description: A gate metric regressed compared to the previous snapshot.
    severity: error
    expected: false
    suggestion: "Compare the current report with the prior snapshot in .kimi/var/effect-gates.ndjson."
    patterns:
      - regex: "effect.gates.*regression"

  - id: effect_gates_manifest_invalid
    name: Effect gates manifest invalid
    description: The constants manifest is missing, stale, or lacks required Effect discipline constants.
    severity: error
    expected: false
    suggestion: "Run bun run manifest:generate && bun run format."
    patterns:
      - regex: "effect.gates.*manifest"

  - id: effect_gates_session_floor_failed
    name: Effect gates session floor failed
    description: Session floor counts are missing or below required thresholds.
    severity: error
    expected: false
    suggestion: "Review session-level Effect usage and run kimi-doctor --effect-gates."
    patterns:
      - regex: "effect.gates.*session.floor"

  - id: effect_gates_run_promise_boundary_violation
    name: Effect.runPromise boundary violation
    description: Effect.runPromise was called outside src/cli, src/entry, src/runtime.ts, or test files.
    severity: error
    expected: false
    suggestion: "Move the Effect.runPromise call to a CLI entry, runtime file, or test; library code should return Effects."
    boundConstants:
      - KIMI_EFFECT_RUN_PROMISE_BOUNDARY_ENABLED
    patterns:
      - regex: "run-promise-boundary"

  - id: effect_audit_fail
    name: Effect discipline audit failed
    description: kimi-heal effect audit or effect-gates reported discipline violations.
    severity: warn
    expected: false
    suggestion: "Run kimi-doctor --effect-gates and kimi-heal effect audit --json; fix run-promise-boundary and direct-promise hits in src/lib."
    autoFix: "kimi-doctor --effect-gates"
    patterns:
      - regex: "── Effect Audit ──"
      - regex: "run-promise-boundary"
      - regex: "direct-promise"
      - regex: "\\d+ violation\\(s\\), \\d+ error\\(s\\)"

  - id: effect_gates_event_stream_violation
    name: Effect event stream violation
    description: Service code used Node.js EventEmitter-style patterns instead of Effect streams.
    severity: error
    expected: false
    suggestion: "Replace EventEmitter usage with Effect streams in src/services code."
    patterns:
      - regex: "event-stream"

  - id: doctor_adapter_failed
    name: Doctor adapter failed
    description: An external tool adapter failed to execute or returned a non-zero exit code.
    severity: error
    expected: false
    suggestion: "Check the adapter output and rerun with --adapter <name> --json."
    autoFix: "kimi-doctor --adapter <name>"
    patterns:
      - regex: "adapter .* failed"

  - id: doctor_adapter_timeout
    name: Doctor adapter timeout
    description: An external tool adapter exceeded its execution timeout.
    severity: error
    expected: false
    suggestion: "Increase timeout with --timeout or reduce scope."
    patterns:
      - regex: "adapter .* timed out"

  - id: doctor_plugin_invalid
    name: Doctor plugin invalid
    description: A doctor plugin entry failed schema validation or its command is not executable.
    severity: warning
    expected: false
    suggestion: "Fix the plugin entry in doctor-plugins.json."
    patterns:
      - regex: "invalid plugin"

  - id: doctor_plugin_failed
    name: Doctor plugin failed
    description: A doctor plugin command failed to execute.
    severity: error
    expected: false
    suggestion: "Check the plugin output and fix the plugin script."
    patterns:
      - regex: "plugin failed"

  - id: doctor_mcp_internal
    name: Doctor MCP internal error
    description: The kimi-doctor MCP server encountered an internal error handling a request.
    severity: error
    expected: false
    suggestion: "Restart the MCP server and check stderr."
    patterns:
      - regex: "doctor_mcp_internal"

  - id: dashboard_health_failure
    name: Dashboard health check failed
    description: The Herdr dashboard /api/health probe reported a warn or error status for a subsystem.
    severity: warn
    expected: false
    suggestion: "Check the Herdr dashboard health summary for agents, SSE, herdr socket, gate health, or discovery."
    autoFix: "kimi-doctor --quick"
    patterns:
      - regex: "dashboard health"
      - regex: "/api/health"
      - regex: "health check failed"

  - id: build_constant_undefined
    name: Build-time constant undefined
    description: A bunfig.toml [define] constant was referenced but not defined in the current project or runtime.
    severity: error
    expected: false
    suggestion: "Add the missing [define] entry to bunfig.toml or provide a runtime fallback."
    patterns:
      - regex: "ReferenceError: KIMI_.*is not defined"
      - regex: "KIMI_.*is not defined"

  - id: image_oversized
    name: Oversized image asset
    description: An image file exceeds dimension or pixel-count limits — decompression-bomb or DOS risk.
    severity: error
    expected: false
    suggestion: "Resize the image to within allowed limits. For large assets, use Bun.Image to generate thumbnails."
    patterns:
      - regex: "Image exceeds max dimension"
      - regex: "Image exceeds max pixels"

  - id: image_corrupt
    name: Corrupt image file
    description: An image file could not be decoded — likely truncated or malformed.
    severity: error
    expected: false
    suggestion: "Replace or re-encode the corrupt image file."
    patterns:
      - regex: "Corrupt or unparseable image"

  - id: image_header_secrets
    name: Secrets in image file header
    description: Suspicious strings (password, API key, private key) found in image file header bytes.
    severity: warn
    expected: false
    suggestion: "Remove embedded credentials from image metadata. Use Bun.secrets or env vars instead."
    patterns:
      - regex: "Suspicious strings in file header"
      - regex: "Suspicious strings in PNG text chunks"

  - id: image_high_entropy
    name: High-entropy image pixels
    description: Image pixel data has unusually high Shannon entropy — possible steganographic data hiding.
    severity: warn
